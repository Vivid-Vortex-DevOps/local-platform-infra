auth:
  strategy: anonymous

deployment:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

external_services:
  prometheus:
    url: "http://kube-prometheus-stack-prometheus.monitoring:9090"
  grafana:
    enabled: true
    in_cluster_url: "http://kube-prometheus-stack-grafana.monitoring:80"
  tracing:
    enabled: true
    in_cluster_url: "http://jaeger-query.monitoring:16686"
